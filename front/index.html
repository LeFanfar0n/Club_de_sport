<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Club de sport 21</title>
  <link rel="styleshhet" href="./src/style.css" />
</head>

<body>
  <main>
    <h1>Salut les sportifs !</h1>
    <section>
      <h2>Liste des cours</h2>

      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Description</th>
            <th>Niveau</th>
            <th>Places</th>
          </tr>
        </thead>

        <tbody id="courses-table-body">
          <!-- Les cours seront ajoutés ici en TypeScript -->
        </tbody>
      </table>
      <section>
        <h2>Ajouter un adhérent</h2>

        <input id="adherent-nom" placeholder="Nom" />
        <input id="adherent-prenom" placeholder="Prénom" />
        <input id="adherent-email" placeholder="Email" />

        <button id="btn-ajouter-adherent">Ajouter l'adhérent</button>
      </section>

      <section>
        <h2>Inscrire un adhérent à un cours</h2>

        <input id="inscription-id-adherent" type="number" placeholder="ID adhérent" />
        <input id="inscription-id-cours" type="number" placeholder="ID cours" />

        <button id="btn-inscrire">Inscrire</button>
      </section>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
